# Default configuration for VLM planning experiments

defaults:
  - env: Motion2D-p0-v0

# Agent configuration
vlm_model: "gpt-5"
temperature: 1
rgb_observation: true
use_env_models: true
prompt_type: "basic"  # "basic" or "llmplanner"

# Evaluation configuration
seed: 0
num_eval_episodes: 50

hydra:
  run:
    dir: ./logs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: ./logs/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
